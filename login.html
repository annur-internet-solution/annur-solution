<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
background:#050816;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#11182d;
padding:40px;
border-radius:20px;
width:320px;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#0b1220;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:gold;
border:none;
border-radius:10px;
font-weight:bold;
}

</style>

</head>
<body>

<div class="box">

<h2>Login</h2>

<input id="loginEmail" placeholder="Email">

<input
id="loginPassword"
type="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<p style="margin-top:20px;">

No account?

<a href="signup.html" style="color:gold;">
Signup
</a>

</p>

</div>

<script src="auth.js"></script>

</body>
</html>
